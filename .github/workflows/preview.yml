name: Expo Preview

on:
  pull_request:
    branches: [master, main]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update
        run: eas update --branch preview --message "PR preview"

      - name: Add QR comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://expo.dev/@sheetal00000/Personal_disaster_assistant_frontend?update-channel=preview';
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Expo Preview
              
              Scan with Expo Go:
              
              ![QR Code](${qrUrl})
              
              **URL:** ${url}`
            });
