name: Expo Preview

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Create preview for Expo Go
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --auto --branch preview
          comment: true
          project-flavor: expo-go

      - name: Get preview URL
        if: github.event_name == 'pull_request'
        id: preview
        run: |
          echo "url=https://expo.dev/@sheetal00000/Personal_disaster_assistant_frontend?update-channel=preview" >> $GITHUB_OUTPUT

      - name: Add comment with QR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${{ steps.preview.outputs.url }}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📱 Expo Go Preview
              
              Scan this QR code with Expo Go:
              
              <img src="${qrUrl}" width="250" />
              
              **Or open:** ${{ steps.preview.outputs.url }}
              
              > No login required.`
            });
