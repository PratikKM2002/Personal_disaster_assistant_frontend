databases:
  - name: guardian-ai-db
    plan: free
    databaseName: pda
    user: pda_user

services:
  - type: web
    plan: free
    name: guardian-ai-backend
    runtime: node
    rootDir: Backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-ai-db
          property: connectionString
